name: Automated Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Execution Mode'
        required: false
        default: basic
        type: choice
        options:
          - basic
          - safe
          - stress
      threads:
        description: 'Threads'
        required: false
        default: '4'
        type: string
      test_env:
        description: 'Environment'
        required: false
        default: DEV
        type: choice
        options:
          - DEV
          - QA
          - PROD
      safe_pause_seconds:
        description: 'Rest per test batch (seconds)'
        required: false
        default: '30'
        type: string
      tags:
        description: 'Run specific TAGS (e.g. PHARMA-67)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ github.token }}
  GIT_AUTHOR_NAME: github-actions[bot]
  GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  GIT_COMMITTER_NAME: github-actions[bot]
  GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  REPORT_PUBLISH: '1'
  TEST_ENV: 'DEV'
  THREADS: '4'
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
  CI: true

concurrency:
  # Manual runs should not cancel each other; auto runs should cancel older same-ref runs.
  group: ${{ github.event_name == 'workflow_dispatch' && format('tests-manual-{0}', github.run_id) || format('tests-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  test-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      mode: ${{ inputs.run_mode || 'basic' }}
      event_name: workflow_dispatch
      test_env: ${{ inputs.test_env || 'DEV' }}
      threads: ${{ inputs.threads || '4' }}
      safe_pause_seconds: ${{ inputs.safe_pause_seconds || '30' }}
      run_tags: ${{ inputs.tags || '' }}
      artifact_name: playwright-report
    secrets: inherit

  test-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      mode: safe
      event_name: push
      test_env: DEV
      threads: '4'
      safe_pause_seconds: '30'
      run_tags: smoke
      artifact_name: playwright-report-merge
    secrets: inherit

  qa-scheduled-full:
    if: github.event_name == 'schedule'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      mode: safe
      event_name: workflow_dispatch
      test_env: QA
      threads: '4'
      safe_pause_seconds: '30'
      run_tags: ''
      artifact_name: playwright-report-qa-scheduled
    secrets: inherit
