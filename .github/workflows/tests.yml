name: Automated Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Execution Mode'
        required: false
        default: basic
        type: choice
        options:
          - basic
          - regression
          - stress
      threads:
        description: 'Threads (1/2/3/4)'
        required: false
        default: '4'
        type: string
      test_env:
        description: 'Environment'
        required: false
        default: DEV
        type: choice
        options:
          - DEV
          - QA
          - PROD
      tags:
        description: 'Run specific TAGS (e.g. PHARMA-67)'
        required: false
        default: ''
        type: string
      project:
        description: 'Optional project filter (api, e2e, or e2e,api)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ github.token }}
  GIT_AUTHOR_NAME: github-actions[bot]
  GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  GIT_COMMITTER_NAME: github-actions[bot]
  GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  REPORT_PUBLISH: '1'
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
  CI: true

concurrency:
  # Manual runs should not cancel each other; auto runs should cancel older same-ref runs.
  group: ${{ github.event_name == 'workflow_dispatch' && format('tests-manual-{0}', github.run_id) || format('tests-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  test-manual:
    if: github.event_name == 'workflow_dispatch' && inputs.run_mode != 'regression'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      mode: ${{ inputs.run_mode || 'basic' }}
      test_env: ${{ inputs.test_env || 'DEV' }}
      threads: ${{ inputs.threads || '4' }}
      run_tags: ${{ inputs.tags || '' }}
      project: ${{ inputs.project || '' }}
      artifact_name: playwright-report
    secrets: inherit

  regression-api:
    if: github.event_name == 'workflow_dispatch' && inputs.run_mode == 'regression'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      mode: regression
      test_env: ${{ inputs.test_env || 'DEV' }}
      threads: ${{ inputs.threads || '4' }}
      run_tags: ${{ inputs.tags || '' }}
      project: api
      artifact_name: playwright-report-regression-api
    secrets: inherit

  regression-e2e:
    if: github.event_name == 'workflow_dispatch' && inputs.run_mode == 'regression'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      mode: regression
      test_env: ${{ inputs.test_env || 'DEV' }}
      threads: ${{ inputs.threads || '4' }}
      run_tags: ${{ inputs.tags || '' }}
      project: e2e
      artifact_name: playwright-report-regression-e2e
    secrets: inherit

  test-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      # Keep job name for historical continuity; behavior is basic smoke pass.
      mode: basic
      test_env: DEV
      threads: '4'
      run_tags: smoke
      artifact_name: playwright-report-merge
    secrets: inherit

  qa-scheduled-api:
    if: github.event_name == 'schedule'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      mode: regression
      test_env: QA
      threads: '2'
      run_tags: ''
      project: api
      artifact_name: playwright-report-qa-scheduled-api
    secrets: inherit

  qa-scheduled-e2e:
    if: github.event_name == 'schedule'
    uses: ./.github/workflows/_run-docker-tests.yml
    with:
      mode: regression
      test_env: QA
      threads: '2'
      run_tags: ''
      project: e2e
      artifact_name: playwright-report-qa-scheduled-e2e
    secrets: inherit
