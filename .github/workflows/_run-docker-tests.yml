name: Run Docker Tests (Reusable)

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      test_env:
        required: true
        type: string
      threads:
        required: true
        type: string
      run_tags:
        required: true
        type: string
      project:
        required: false
        type: string
      artifact_name:
        required: true
        type: string
    secrets:
      SOPS_AGE_KEY:
        required: true

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ github.token }}
  GIT_AUTHOR_NAME: github-actions[bot]
  GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  GIT_COMMITTER_NAME: github-actions[bot]
  GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  REPORT_PUBLISH: '1'
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
  CI: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Configure git identity for report publish
        run: |
          git config --global user.name "${GIT_COMMITTER_NAME}"
          git config --global user.email "${GIT_COMMITTER_EMAIL}"
      - name: Install sops
        shell: bash
        run: |
          bash scripts/secrets/install-sops.sh
      - name: Load encrypted secrets
        shell: bash
        run: |
          if [[ -z "${SOPS_AGE_KEY:-}" ]]; then
            echo "Missing SOPS_AGE_KEY secret"
            exit 1
          fi

          TEST_ENV="${{ inputs.test_env }}" node scripts/secrets/load-secrets.js --env "${{ inputs.test_env }}" -- --env-file .ci-secrets.env --required
      - name: Set report routing by branch
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "REPORT_PUBLISH=1" >> "$GITHUB_ENV"
            echo "CI routing: main branch -> env test channels"
          else
            echo "REPORT_PUBLISH=0" >> "$GITHUB_ENV"
            echo "CI routing: non-main branch -> LOCAL_RUNS_CHANNELID"
          fi
      - name: Validate required credentials
        shell: bash
        run: |
          bash scripts/secrets/validate-env-file.sh .ci-secrets.env
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build CI test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: pharmaserv-tests-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run tests in Docker
        shell: bash
        run: |
          MODE="${{ inputs.mode }}" \
          TEST_ENV="${{ inputs.test_env }}" \
          THREADS="${{ inputs.threads }}" \
          RUN_TAGS="${{ inputs.run_tags }}" \
          PROJECT="${{ inputs.project }}" \
          DOCKER_IMAGE="pharmaserv-tests-ci" \
          ENV_FILE=".ci-secrets.env" \
          ./scripts/ci/run-tests-in-docker.sh
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            .playwright-report
            test-results
            screenshots
            .blob-report
          include-hidden-files: true
      - name: Cleanup CI secret and blob files
        if: always()
        shell: bash
        run: |
          rm -f .ci-secrets.env
          rm -f .discord-run.json
          rm -rf .blob-report || docker run --rm -v "$PWD:/w" alpine sh -lc 'rm -rf /w/.blob-report'
